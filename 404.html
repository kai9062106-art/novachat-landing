<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>页面走丢了 · NovaChat</title>
<style>
:root{--vermillion:#c8412d;--vermillion-deep:#a8341f;--bg:#f6f4ef;--ink:#2a2a2a;--muted:#7a7469;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;}
.wrap{max-width:480px;}
.big{font-size:120px;font-weight:700;color:var(--vermillion);letter-spacing:-4px;line-height:1;margin-bottom:16px;}
h1{font-size:24px;margin-bottom:12px;}
.desc{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:28px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{padding:12px 24px;border-radius:10px;font-size:14px;text-decoration:none;transition:all .15s;display:inline-block;}
.btn-primary{background:var(--vermillion);color:#fff;}
.btn-primary:hover{background:var(--vermillion-deep);}
.btn-ghost{border:1.5px solid var(--vermillion);color:var(--vermillion);}
.btn-ghost:hover{background:rgba(200,65,45,0.08);}
.quote{margin-top:40px;font-size:13px;color:var(--muted);font-style:italic;opacity:.7;}
</style>
</head>
<body>
<main class="wrap">
    <div class="big">404</div>
    <h1>这条路走不通</h1>
    <p class="desc">你找的那一页，可能还没写、可能搬家了、也可能根本没存在过。<br>要不先回大观园转转？</p>
    <div class="btns">
        <a class="btn btn-primary" href="/">返回首页</a>
        <a class="btn btn-ghost" href="/login.html">去登录</a>
    </div>
    <p class="quote">"众里寻他千百度……蓦然回首，那页却在灯火阑珊处。"</p>
</main>
</body>
</html>
