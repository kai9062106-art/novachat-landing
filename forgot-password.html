<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>找回密码 · NovaChat</title>
<style>
:root{--vermillion:#c8412d;--vermillion-deep:#a8341f;--bg:#f6f4ef;--ink:#2a2a2a;--muted:#7a7469;--line:#e4dfd3;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.04);}
.brand{text-align:center;margin-bottom:28px;}
.brand h1{font-size:28px;letter-spacing:2px;color:var(--vermillion);font-weight:600;}
.brand p{font-size:13px;color:var(--muted);margin-top:6px;}
h2{font-size:20px;margin-bottom:8px;}
.hint{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.field{display:block;margin-bottom:18px;}
.field span{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;background:#fff;transition:all .15s;}
.field input:focus{outline:none;border-color:var(--vermillion);box-shadow:0 0 0 3px rgba(200,65,45,0.12);}
.btn{width:100%;padding:12px;background:var(--vermillion);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--vermillion-deep);}
.msg{margin-top:14px;font-size:13px;min-height:20px;text-align:center;color:var(--vermillion);}
.foot{text-align:center;margin-top:24px;font-size:13px;}
.foot a{color:var(--muted);text-decoration:none;}
.foot a:hover{color:var(--vermillion);}
</style>
</head>
<body>
<main class="card">
    <div class="brand">
        <h1>NovaChat</h1>
        <p>把李白拉进群，或造一个你的群。</p>
    </div>
    <h2>找回密码</h2>
    <p class="hint">输入你注册时使用的邮箱，我们会发一封重置链接过去。</p>
    <form id="forgot-form" novalidate>
        <label class="field">
            <span>邮箱</span>
            <input type="email" name="email" required autocomplete="email" placeholder="name@example.com">
        </label>
        <button type="submit" class="btn">发送重置链接</button>
        <p class="msg" id="msg" aria-live="polite"></p>
    </form>
    <div class="foot">
        <a href="/login.html">← 返回登录</a>
    </div>
</main>
<script>
const form = document.getElementById('forgot-form');
const msg = document.getElementById('msg');
form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = form.email.value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.textContent = '邮箱格式不对，再看看？';
        return;
    }
    msg.textContent = '演示模式：未对接后端（重置邮件发不出去，先记着这里）';
    // TODO: 对接后端 POST /api/auth/forgot-password
});
</script>
</body>
</html>
