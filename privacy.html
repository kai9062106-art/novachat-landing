<h2>我们收集什么</h2>
<p>NovaChat 仅在用户主动提交内测申请时收集邮箱地址,表单数据由 Tally.so 处理,不存储于 NovaPulse 自有服务器。</p>
<h2>我们如何使用</h2>
<p>邮箱仅用于发送内测开通通知、重大产品更新公告与不定期反馈邀请。</p>
<h2>第三方服务</h2>
<p>本站使用 Cloudflare Pages 托管、Tally.so 收集表单。访问行为可能被这些服务以匿名方式记录用于性能与安全分析。</p>
<h2>用户权利</h2>
<p>您可随时发邮件至 a9062106@novapulse.cn 要求查看、更正或删除您的邮箱记录,我们将在 7 个工作日内响应。</p>
